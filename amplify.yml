version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20.19.0
        - nvm use 20.19.0
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customRules:
    - source: /mockups/<*>
      target: /mockups/<*>
      status: '200'
    - source: </^[^.]+$/>
      target: /index.html
      status: '200'